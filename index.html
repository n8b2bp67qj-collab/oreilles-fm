<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oreilles FM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0e;
  --surface: #161616;
  --surface2: #242424;
  --border: #2e2e2e;
  --accent: #e8e8e8;
  --red: #d42b2b;
  --red-dim: rgba(212,43,43,0.18);
  --blue: #2b6dd4;
  --text: #f0f0f0;
  --muted: #555;
  --pop-bg: #141414;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Space Mono', monospace;
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Header ── */
#header {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 20px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px;
  color: var(--text); letter-spacing: -0.5px; white-space: nowrap;
  text-decoration: underline; text-decoration-style: wavy;
  text-underline-offset: 4px; text-decoration-color: var(--red);
}
#logo span { color: var(--red); }

/* ── Player ── */
#player {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px dashed var(--border);
  border-radius: 2px; padding: 7px 12px; flex: 1; max-width: 480px; min-width: 0;
}
#pbtn {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--text); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: transform .1s;
}
#pbtn:hover { transform: scale(1.1); }
#pbtn svg { width: 10px; height: 10px; fill: #000; }
.pi { flex: 1; min-width: 0; }
.pn { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pm { font-size: 10px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; font-style: italic; }
.eq { display: flex; align-items: flex-end; gap: 2px; height: 14px; flex-shrink: 0; }
.eb { width: 3px; background: var(--red); border-radius: 1px; height: 4px; }
.eq.on .eb { animation: eq .7s ease-in-out infinite alternate; }
.eq.on .eb:nth-child(2) { animation-delay: .2s; }
.eq.on .eb:nth-child(3) { animation-delay: .4s; }
@keyframes eq { to { height: 13px; } }
.vw { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.vw svg { width: 12px; height: 12px; fill: var(--muted); }
#vol { width: 50px; accent-color: var(--red); }
#addbtn {
  background: transparent; border: 1px dashed var(--border); color: var(--muted);
  padding: 7px 12px; border-radius: 2px; font-family: 'Space Mono', monospace;
  font-size: 10px; cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all .15s;
}
#addbtn:hover { border-color: var(--text); color: var(--text); }

/* ── Pen indicator ── */
#pen-pill {
  display: inline-flex; align-items: center; gap: 5px;
  background: transparent; border: 1px dashed var(--border);
  color: var(--muted); padding: 5px 9px; border-radius: 2px;
  font-size: 9px; letter-spacing: .5px; text-transform: uppercase;
  white-space: nowrap; flex-shrink: 0; cursor: default;
  transition: color .2s, border-color .2s;
}
#pen-pill .pen-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #555; transition: background .2s, box-shadow .2s;
}
#pen-pill.active { color: var(--text); border-color: var(--red); }
#pen-pill.active .pen-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }
#pen-pill { cursor: pointer; }
#pen-pill:hover { color: var(--text); }

/* ── Pen-code assignment popup ── */
#assign-popup {
  position: fixed; top: 56px; right: 16px; z-index: 200;
  background: var(--pop-bg); border: 1px solid var(--border);
  border-radius: 2px; width: 290px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.6);
  display: none; font-family: 'Space Mono', monospace;
}
#assign-popup.open { display: block; }
.assign-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 12px; border-bottom: 1px dashed var(--border);
  font-size: 9px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted);
}
.assign-close {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 16px; padding: 0 4px; line-height: 1;
}
.assign-close:hover { color: var(--text); }
.assign-body { padding: 12px; }
.assign-code-display {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px;
  color: var(--text); margin-bottom: 4px; letter-spacing: 1px;
}
.assign-current {
  font-size: 10px; color: var(--muted); font-style: italic; margin-bottom: 12px;
}
.assign-current.overridden { color: var(--red); }
#assign-input {
  width: 100%; background: var(--surface2); border: none;
  border-bottom: 1px solid var(--border); color: var(--text);
  padding: 7px 4px; font-family: 'Space Mono', monospace; font-size: 11px;
  outline: none; margin-bottom: 12px;
}
#assign-input:focus { border-bottom-color: var(--red); }
#assign-input::placeholder { color: var(--muted); font-style: italic; }
.assign-actions { display: flex; gap: 6px; }
.assign-actions button {
  flex: 1; padding: 7px 6px 9px; border-radius: 1px;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px;
  line-height: 1.4; cursor: pointer; border: none;
}
#assign-clear { background: transparent; border: 1px dashed var(--border); color: var(--muted); display: none; }
#assign-clear:hover { color: var(--red); border-color: var(--red); }
#assign-cancel { background: var(--surface2); color: var(--muted); border: 1px dashed var(--border); }
#assign-save { background: var(--text); color: #000; }

/* ── Layout ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar toggle ── */
#sidebar {
  width: 230px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden;
  transition: width .25s ease, opacity .25s ease;
}
#sidebar.hidden { width: 0; opacity: 0; pointer-events: none; border: none; }
#toggle-sidebar {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; padding: 5px 9px;
  font-size: 14px; line-height: 1; border-radius: 2px;
  flex-shrink: 0; transition: color .15s;
}
#toggle-sidebar:hover { color: var(--text); }
#sw { padding: 10px; border-bottom: 1px solid var(--border); }
#search {
  width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); padding: 5px 2px; font-family: 'Space Mono', monospace; font-size: 11px;
  outline: none; font-style: italic;
}
#search:focus { border-bottom-color: var(--red); }
#search::placeholder { color: var(--muted); }
#list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.sc { font-size: 9px; color: var(--muted); padding: 8px 12px; letter-spacing: .8px; text-transform: uppercase; }
.fav-sep { font-size: 9px; color: var(--red); padding: 8px 12px 3px; letter-spacing: .8px; text-transform: uppercase; }
.si {
  padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #1c1c1c;
  display: flex; align-items: center; gap: 8px; transition: background .1s;
}
.si:hover { background: var(--surface2); }
.si.active { background: #1a0000; border-left: 2px solid var(--red); }
.si.faved .sd { background: var(--red) !important; opacity: 1 !important; }
.si.dead .sd { background: var(--blue) !important; opacity: 1 !important; }
.sd { width: 6px; height: 6px; border-radius: 50%; background: #888; flex-shrink: 0; opacity: .7; }
.si.active .sd { background: var(--red) !important; opacity: 1; }
.sinfo { flex: 1; min-width: 0; }
.sn { font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sl { font-size: 10px; color: var(--muted); margin-top: 1px; font-style: italic; }
.icon-btn { background: none; border: none; cursor: pointer; padding: 0 2px; opacity: .55; color: #888; transition: opacity .15s, color .15s; flex-shrink: 0; line-height: 1; }
.icon-btn:hover { opacity: 1; color: var(--text); }
.fheart { font-size: 11px; }
.fheart.on { opacity: 1; color: var(--red); }
.edit-icon { font-size: 11px; }

/* ── Globe ── */
#globe-wrap { flex: 1; position: relative; overflow: hidden; background: var(--bg); }
#globe-canvas { width: 100%; height: 100%; display: block; cursor: grab; }
#globe-canvas:active { cursor: grabbing; }

/* ── Popup ── */
#popup {
  position: absolute; background: var(--pop-bg);
  border: 1px solid var(--border);
  border-radius: 2px; padding: 0; width: 230px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.6);
  display: none; z-index: 100; pointer-events: all;
  font-family: 'Space Mono', monospace;
}
#popup-inner { padding: 13px 14px 14px; }
.pop-header { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 2px; padding-right: 20px; }
.pop-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; color: var(--text); flex: 1; }
.pop-row { display:flex; align-items:center; gap:6px; margin-bottom: 8px; }
.pop-loc { font-size: 10px; color: var(--muted); font-style: italic; flex: 1; margin: 0; }
.pop-icon { background: none; border: none; cursor: pointer; font-size: 13px; padding: 0; line-height: 1; opacity: .55; color: #888; transition: opacity .15s, color .15s; flex-shrink: 0; }
.pop-icon:hover { opacity: 1; color: var(--text); }
.pop-icon.on { opacity: 1; color: var(--red); }
.pop-desc { font-size: 10px; color: #888; line-height: 1.6; margin-bottom: 9px; font-style: italic; }
.pop-web { font-size: 10px; color: #aaa; text-decoration: none; display: block; margin-bottom: 10px; opacity: .6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity .15s; }
.pop-web:hover { opacity: 1; color: var(--text); }
.pop-play {
  width: 100%; padding: 8px 10px; background: transparent; color: var(--muted);
  border: 1px solid var(--border); border-radius: 1px;
  font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer;
  transition: color .15s, border-color .15s; text-align: left; letter-spacing: .3px;
}
.pop-play:hover { color: var(--text); border-color: var(--text); }
.pop-play.loading { color: var(--muted); border-color: var(--border); cursor: default; }
.pop-play.stop { color: var(--red); border-color: var(--red); }
.pop-play.dead { color: var(--blue); border-color: var(--blue); }
#popup-close {
  position: absolute; top: 8px; right: 8px; background: none; border: none;
  color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1;
  padding: 2px 4px; transition: color .15s;
}
#popup-close:hover { color: var(--text); }

/* ── Modal ── */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); z-index: 9999; display: none; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
#modal { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 22px; width: 380px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 6px 6px 0 rgba(0,0,0,0.5); }
#modal h2 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; margin-bottom: 14px; color: var(--text); }
.mf { margin-bottom: 10px; }
.mf label { display: block; font-size: 9px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .5px; }
.mf input, .mf select, .mf textarea { width: 100%; background: var(--surface2); border: none; border-bottom: 1px solid var(--border); color: var(--text); padding: 6px 2px; font-family: 'Space Mono', monospace; font-size: 11px; outline: none; }
.mf input:focus, .mf select:focus, .mf textarea:focus { border-bottom-color: var(--red); }
.mf textarea { resize: vertical; min-height: 50px; }
.mf select option { background: var(--surface2); }
.hint { font-size: 9px; color: var(--muted); margin-top: 3px; font-style: italic; }
.mrow { display: flex; gap: 12px; }
.mrow .mf { flex: 1; }
.mbtns { display: flex; gap: 8px; margin-top: 16px; }
.mbtns button { flex: 1; padding: 9px 9px 12px; border-radius: 1px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; line-height: 1.4; cursor: pointer; border: none; }
#mcancel { background: var(--surface2); color: var(--muted); border: 1px dashed var(--border); }
#msave { background: var(--text); color: #000; }
#mdelete { background: transparent; color: var(--red); border: 1px dashed var(--red); display: none; }
#merr { font-size: 10px; color: var(--red); margin-top: 6px; display: none; font-style: italic; }
#mgeo { font-size: 10px; color: var(--muted); margin-top: 4px; font-style: italic; }
#mgeo.ok { color: #3ecf6e; }
#mgeo.fail { color: var(--red); }
.rbs { padding: 7px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: padding .1s; }
.rbs:hover { padding-left: 6px; }
.rbn { font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; }
.rbm { font-size: 10px; color: var(--muted); }
#rblist { margin-top: 8px; max-height: 150px; overflow-y: auto; }
#rbgo { width: 100%; padding: 7px; background: transparent; border: 1px dashed var(--border); color: var(--muted); border-radius: 1px; font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer; margin-top: 5px; }
#rbgo:hover { border-color: var(--text); color: var(--text); }

audio { display: none; }

#version-tag {
  position: fixed; bottom: 6px; right: 8px;
  font-family: 'Space Mono', monospace; font-size: 8px;
  color: var(--muted); opacity: .55; letter-spacing: .5px;
  pointer-events: none; z-index: 50; text-transform: uppercase;
}

@media (max-width: 550px) {
  #header { padding: 8px 10px; gap: 8px; flex-wrap: wrap; }
  #logo { font-size: 14px; }
  #player { padding: 6px 8px; gap: 6px; flex: 1; min-width: 0; }
  .vw { display: none; }
  .pm { display: none; }
  #addbtn { display: none; }
  #pen-pill { display: none; }
  #mobile-add { display: flex; }
}
#mobile-add {
  display: none; position: fixed; bottom: 18px; right: 18px; z-index: 200;
  background: var(--surface); border: 1px dashed var(--border);
  color: var(--muted); padding: 10px 14px; border-radius: 2px;
  font-family: 'Space Mono', monospace; font-size: 11px; cursor: pointer;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div id="header">
  <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle panel">☰</button>
  <div id="logo">OREILLES<span> FM</span></div>
  <div id="player">
    <button id="pbtn" onclick="togglePlay()">
      <svg id="picon" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>
    </button>
    <div class="pi">
      <div class="pn" id="pname">Select a station</div>
      <div class="pm" id="pmeta">spin the globe, click a dot</div>
    </div>
    <div class="eq" id="eq"><div class="eb"></div><div class="eb"></div><div class="eb"></div></div>
    <div class="vw">
      <svg viewBox="0 0 14 12"><path d="M0 4h3l4-4v12l-4-4H0zM10 2a6 6 0 010 8M8 3.5a3.5 3.5 0 010 5"/></svg>
      <input type="range" id="vol" min="0" max="1" step=".01" value=".8" oninput="onVolume(this.value)">
    </div>
  </div>
  <div id="pen-pill" title="SmartGlobe pen ready — tap a country">
    <span class="pen-dot"></span><span>pen</span>
  </div>
  <button id="addbtn" onclick="openModal()">+ add radio</button>
</div>
<button id="mobile-add" onclick="openModal()">+ add radio</button>

<div id="main">
  <div id="sidebar">
    <div id="sw"><input type="text" id="search" placeholder="search stations…" oninput="renderList()"></div>
    <div id="list"></div>
  </div>
  <div id="globe-wrap">
    <canvas id="globe-canvas"></canvas>
    <div id="popup">
      <button id="popup-close" onclick="closePopup()">×</button>
      <div id="popup-inner"></div>
    </div>
  </div>
</div>

<!-- Add/edit radio modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="mtitle">+ add your radio</h2>
    <div class="mf">
      <label>Search Radio Browser (30 000+ stations)</label>
      <input type="text" id="rbq" placeholder="Station name…" onkeydown="if(event.key==='Enter')searchRB()">
      <button id="rbgo" onclick="searchRB()">Search →</button>
      <div id="rblist"></div>
    </div>
    <div style="border-top:1px dashed var(--border);margin:12px 0;font-size:10px;color:var(--muted);text-align:center;font-style:italic">— or fill in manually —</div>
    <div class="mf"><label>Name *</label><input type="text" id="mname" placeholder="Station name"></div>
    <div class="mrow">
      <div class="mf"><label>City</label><input type="text" id="mcity" oninput="scheduleGeocode()"></div>
      <div class="mf"><label>Country</label><input type="text" id="mcountry" oninput="scheduleGeocode()"></div>
    </div>
    <div id="mgeo">📍 location auto-detected from city + country</div>
    <div class="mf"><label>Description</label><textarea id="mdesc" placeholder="Short description…"></textarea></div>
    <div class="mf">
      <label>Stream URL *</label>
      <input type="text" id="mstream" placeholder="https://…stream….mp3">
      <div class="hint">Direct .mp3 / .aac / .ogg stream link</div>
    </div>
    <div class="mf"><label>Website</label><input type="text" id="mweb" placeholder="https://…"></div>
    <div id="merr">Please provide at least a name and a stream URL.</div>
    <div class="mbtns">
      <button id="mcancel" onclick="closeModal()">Cancel</button>
      <button id="mdelete" onclick="deleteCurrentEdit()">Delete</button>
      <button id="msave" onclick="saveStation()">Add station</button>
    </div>
  </div>
</div>

<audio id="audio-el"></audio>

<!-- Pen-code → country assignment popup -->
<div id="assign-popup">
  <div class="assign-head">
    <span>📍 pen code mapping</span>
    <button class="assign-close" onclick="closeAssign()" title="Close">×</button>
  </div>
  <div class="assign-body">
    <div class="assign-code-display" id="assign-code-display">—</div>
    <div class="assign-current" id="assign-current">—</div>
    <input list="country-list" id="assign-input" placeholder="type country name…" autocomplete="off" onkeydown="if(event.key==='Enter')saveAssign()">
    <datalist id="country-list"></datalist>
    <div class="assign-actions">
      <button id="assign-clear" onclick="clearAssign()" title="Remove your override (revert to built-in)">Reset</button>
      <button id="assign-cancel" onclick="closeAssign()">Cancel</button>
      <button id="assign-save" onclick="saveAssign()">Save</button>
    </div>
  </div>
</div>

<div id="version-tag">v0.3 · alpha</div>

<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<script src="https://unpkg.com/topojson-client@3/dist/topojson-client.min.js"></script>

// ── Stream resolution ─────────────────────────────────────────────────────
const RB = ["https://de1.api.radio-browser.info","https://nl1.api.radio-browser.info","https://at1.api.radio-browser.info"];

async function getStream(s) {
  if (s.stream) return s.stream;
  const searches = [
    name => `name=${encodeURIComponent(name)}&nameExact=true&limit=5&hidebroken=true`,
    name => `name=${encodeURIComponent(name)}&limit=8&hidebroken=true&order=votes&reverse=true`,
    name => `name=${encodeURIComponent(name.split(' ')[0])}&limit=8&hidebroken=true&order=votes&reverse=true`,
  ];
  for (const srv of RB) {
    for (const buildQ of searches) {
      try {
        const r = await fetch(`${srv}/json/stations/search?${buildQ(s.name)}`);
        const d = await r.json();
        const url = d[0]?.url_resolved || d[0]?.url;
        if (url) return url;
      } catch(e) {}
    }
  }
  return null;
}

async function searchRB() {
  const q = document.getElementById('rbq').value.trim();
  if (!q) return;
  const btn = document.getElementById('rbgo');
  btn.textContent = 'Searching…'; btn.disabled = true;
  const el = document.getElementById('rblist');
  try {
    const r = await fetch(`${RB[0]}/json/stations/search?name=${encodeURIComponent(q)}&limit=8&hidebroken=true&order=votes&reverse=true`);
    const d = await r.json();
    el.innerHTML = d.length
      ? d.map(s=>`<div class="rbs" onclick="fillRB('${encodeURIComponent(JSON.stringify({name:s.name,city:s.state||s.country,country:s.country,lat:parseFloat(s.geo_lat)||0,lng:parseFloat(s.geo_long)||0,stream:s.url_resolved||s.url,web:s.homepage}))}')"><div class="rbn">${s.name}</div><div class="rbm">${s.country}</div></div>`).join('')
      : '<div class="rbs"><div class="rbm">No results</div></div>';
  } catch(e) { el.innerHTML='<div class="rbs"><div class="rbm" style="color:#e74c3c">Search failed</div></div>'; }
  btn.textContent = 'Search →'; btn.disabled = false;
}

function fillRB(enc) {
  const s = JSON.parse(decodeURIComponent(enc));
  document.getElementById('mname').value = s.name||'';
  document.getElementById('mcity').value = s.city||'';
  document.getElementById('mcountry').value = s.country||'';
  document.getElementById('mstream').value = s.stream||'';
  document.getElementById('mweb').value = s.web||'';
  // remember lat/lng silently if RB provided them
  _modalGeo = (s.lat || s.lng) ? {lat:s.lat, lng:s.lng} : null;
  if (_modalGeo) setGeoStatus('ok', `📍 location prefilled (${s.lat.toFixed(2)}, ${s.lng.toFixed(2)})`);
  document.getElementById('rblist').innerHTML = '<div style="font-size:10px;color:#3ecf6e;padding:6px 0;font-style:italic">✓ Filled — review and add</div>';
}

  return custom.some(c => c.name === s.name);
}
// Returns the original BUILT_IN name a station maps to (direct or via override), or null.
function builtinKeyFor(stationName) {
  // Direct match
  if (BUILT_IN.some(b => b.name === stationName) && !custom.some(c => c.name === stationName)) {
    // Could also be shadowed by override under same name
    if (!builtinOverrides[stationName] || builtinOverrides[stationName].name === stationName) return stationName;
  }
  // Indirect via override (renamed built-in)
  for (const k of Object.keys(builtinOverrides)) {
    if (builtinOverrides[k].name === stationName) return k;
  }
  // Plain built-in fallback
  if (BUILT_IN.some(b => b.name === stationName)) return stationName;
  return null;
}

// ── White noise (FM static) ───────────────────────────────────────────────
let _audioCtx = null;
let _noiseSource = null, _noiseGain = null;
function getCtx() {
  if (!_audioCtx) {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

function startStatic() {
  try {
    stopStatic(0);
    const ctx = getCtx();
    const bufferSize = 2 * ctx.sampleRate;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random()*2 - 1) * 0.6;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2200;
    filter.Q.value = 0.5;
    _noiseSource = ctx.createBufferSource();
    _noiseSource.buffer = buffer;
    _noiseSource.loop = true;
    _noiseGain = ctx.createGain();
    const baseVol = parseFloat(document.getElementById('vol').value) * 0.35;
    _noiseGain.gain.value = 0;
    _noiseSource.connect(filter);
    filter.connect(_noiseGain);
    _noiseGain.connect(ctx.destination);
    _noiseSource.start();
    // Quick fade-in
    _noiseGain.gain.linearRampToValueAtTime(baseVol, ctx.currentTime + 0.05);
  } catch (e) { /* audio may be blocked */ }
}

function stopStatic(fadeMs = 350) {
  if (!_noiseGain || !_noiseSource) return;
  try {
    const ctx = getCtx();
    const now = ctx.currentTime;
    _noiseGain.gain.cancelScheduledValues(now);
    _noiseGain.gain.setValueAtTime(_noiseGain.gain.value, now);
    _noiseGain.gain.linearRampToValueAtTime(0, now + fadeMs/1000);
    const src = _noiseSource;
    setTimeout(() => { try { src.stop(); } catch(e){} }, fadeMs + 50);
  } catch(e) {}
  _noiseSource = null; _noiseGain = null;
}

function onVolume(v) {
  audio.volume = parseFloat(v);
  // also reflect in noise if currently active
  if (_noiseGain) {
    try {
      const ctx = getCtx();
      _noiseGain.gain.setValueAtTime(parseFloat(v) * 0.35, ctx.currentTime);
    } catch(e) {}
  }
}

// ── Audio ─────────────────────────────────────────────────────────────────
async function playStation(idx) {
  const s = stations[idx];
  const btn = document.getElementById('pop-playbtn');
  if (current?.name === s.name && playing) { audio.pause(); return; }
  if (btn) { btn.className='pop-play loading'; btn.textContent='⟳ tuning…'; }
  startStatic();                                           // FM-style hiss while loading
  document.getElementById('pmeta').textContent = '📡 tuning…';
  document.getElementById('pname').textContent = s.name;
  const url = await getStream(s);
  if (!url) {
    deadStations.add(s.name);                              // mark blue
    stopStatic(150);
    if (btn) { btn.className='pop-play dead'; btn.textContent='✕ stream not found'; }
    document.getElementById('pmeta').textContent = '⚠ stream not found — try another';
    drawGlobe(); renderList();
    return;
  }
  current = s;
  audio.src = url; audio.volume = parseFloat(document.getElementById('vol').value);
  try { await audio.play(); playing = true; }
  catch(e) {
    stopStatic(150);
    if(btn){ btn.className='pop-play'; btn.textContent='✕ blocked by browser'; }
    return;
  }
  // station now playing — kill the static
  setTimeout(() => stopStatic(450), 100);
  deadStations.delete(s.name);
  document.getElementById('pname').textContent = s.name;
  document.getElementById('pmeta').textContent = s.city + ', ' + s.country;
  updatePlayerUI(); renderList(); drawGlobe();
  if(btn){ btn.className='pop-play stop'; btn.textContent='■ stop'; }
}

function togglePlay() {
  if (!current) return;
  if (playing) audio.pause(); else audio.play();
}
audio.addEventListener('play', ()=>{ playing=true; updatePlayerUI(); renderList(); drawGlobe(); });
audio.addEventListener('pause', ()=>{ playing=false; updatePlayerUI(); renderList(); drawGlobe(); updatePopupBtn(); });
audio.addEventListener('error', ()=>{
  document.getElementById('pmeta').textContent='⚠ stream unavailable';
  if (current) deadStations.add(current.name);
  playing=false; stopStatic(150); updatePlayerUI(); drawGlobe(); renderList();
});

function updatePlayerUI() {
  document.getElementById('picon').innerHTML = playing
    ? '<rect x="1" y="0" width="3" height="12"/><rect x="6" y="0" width="3" height="12"/>'
    : '<polygon points="0,0 10,6 0,12"/>';
  document.getElementById('eq').classList.toggle('on', playing);
}
function updatePopupBtn() {
  const btn = document.getElementById('pop-playbtn');
  if (!btn || !current) return;
  const isP = current.name === openStation?.name;
  if(isP && playing){ btn.className='pop-play stop'; btn.textContent='■ stop'; }
  else { btn.className='pop-play'; btn.textContent='▶ play'; }
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const all = stations.map((s,i)=>({...s,_i:i})).filter(s=>
    !q || s.name.toLowerCase().includes(q) || s.city.toLowerCase().includes(q) || s.country.toLowerCase().includes(q)
  );
  const favList = all.filter(s=>favs.has(s.name));
  const rest = all.filter(s=>!favs.has(s.name));
  const mkItem = s => {
    const isFav = favs.has(s.name);
    const isAct = current?.name===s.name;
    const isDead = deadStations.has(s.name);
    const safeName = s.name.replace(/'/g,"\\'");
    // Edit icon now shown for ALL stations (built-ins editable via overrides, deletable via hide flag)
    const editIcon = `<button class="icon-btn edit-icon" onclick="openModalEdit('${safeName}');event.stopPropagation()" title="Edit / delete">✎</button>`;
    return `<div class="si ${isAct?'active':''} ${isFav?'faved':''} ${isDead?'dead':''}" onclick="sidebarClick(${s._i})">
      <div class="sd"></div>
      <div class="sinfo"><div class="sn">${s.name}</div><div class="sl">${s.city}, ${s.country}</div></div>
      ${editIcon}
      <button class="icon-btn fheart ${isFav?'on':''}" onclick="toggleFav('${safeName}');event.stopPropagation()" title="${isFav?'Remove':'Favourite'}">♥</button>
    </div>`;
  };

// ── Globe (D3) ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('globe-canvas');
const ctx = canvas.getContext('2d');
let width, height, proj, path, world;
let rotation = [-10, -45];
let isDragging = false, dragStart = null, rotStart = null;
let openStation = null, openIdx = null;
let animFrame = null;

async function loadWorld() {
  const topo = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json());
  world = topojson.feature(topo, topo.objects.countries);
  resize();
  drawGlobe();
}

function resize() {
  const wrap = document.getElementById('globe-wrap');
  width = wrap.clientWidth; height = wrap.clientHeight;
  canvas.width = width * devicePixelRatio;
  canvas.height = height * devicePixelRatio;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const r = Math.min(width, height) * 0.42;
  proj = d3.geoOrthographic()
    .scale(r)
    .translate([width/2, height/2])
    .clipAngle(90)
    .rotate(rotation);
  path = d3.geoPath(proj, ctx);
}

function drawGlobe() {
  if (!proj) return;
  proj.rotate(rotation);
  ctx.clearRect(0, 0, width, height);
  ctx.beginPath(); proj.clipAngle(180); path({type:'Sphere'}); proj.clipAngle(90);
  ctx.fillStyle = '#0a0f14'; ctx.fill();
  ctx.beginPath(); path({type:'Sphere'});
  ctx.strokeStyle = '#1e2a35'; ctx.lineWidth = 1; ctx.stroke();
  ctx.beginPath(); path(d3.geoGraticule()());
  ctx.strokeStyle = 'rgba(255,255,255,0.03)'; ctx.lineWidth = .5; ctx.setLineDash([2,4]);
  ctx.stroke(); ctx.setLineDash([]);
  if (world) {
    ctx.beginPath(); path(world);
    ctx.fillStyle = '#1a1a1a'; ctx.fill();
    ctx.beginPath(); path(world);
    ctx.strokeStyle = '#2a2a2a'; ctx.lineWidth = .7; ctx.stroke();
  }
  stations.forEach((s, i) => {
    const dist = d3.geoDistance([s.lng, s.lat], [-rotation[0], -rotation[1]]);
    if (dist > Math.PI / 2) return;
    const pt = proj([s.lng, s.lat]); if (!pt) return;
    const [x, y] = pt;
    const isFav = favs.has(s.name);
    const isPlaying = current?.name === s.name && playing;
    const isSelected = openIdx === i;
    const isOpen = openIdx === i;
    const isDead = deadStations.has(s.name);
    if (isPlaying) {
      ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(212,43,43,0.12)'; ctx.fill();
      ctx.beginPath(); ctx.arc(x, y, 6.5, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(212,43,43,0.22)'; ctx.fill();
    }
    if (isSelected && !isPlaying) {
      ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(212,43,43,0.5)'; ctx.lineWidth = 1.5; ctx.stroke();
    }
    const edgeFade = Math.max(0, 1 - (dist / (Math.PI / 2)) * 0.5);
    const r = isOpen ? 5 : 4;
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    if (isDead)        ctx.fillStyle = `rgba(43,109,212,${edgeFade})`;     // blue if stream dead
    else if (isPlaying) ctx.fillStyle = `rgba(212,43,43,${edgeFade})`;
    else if (isFav)    ctx.fillStyle = `rgba(212,43,43,${edgeFade})`;
    else if (isSelected) ctx.fillStyle = `rgba(255,255,255,${edgeFade})`;
    else ctx.fillStyle = `rgba(200,200,200,${0.7 * edgeFade})`;
    ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0,0,0,${0.6 * edgeFade})`; ctx.lineWidth = 1; ctx.stroke();
  });
}

// ── Popup ──────────────────────────────────────────────────────────────────
function openPopup(idx) {
  const s = stations[idx];
  openStation = s; openIdx = idx;
  const isPlaying = current?.name === s.name && playing;
  const isFav = favs.has(s.name);
  const isDead = deadStations.has(s.name);
  const webStr = s.web ? `<a class="pop-web" href="${s.web}" target="_blank">${s.web.replace(/^https?:\/\//,'')}</a>` : '';
  const btnClass = isPlaying ? 'stop' : (isDead ? 'dead' : '');
  const btnLabel = isPlaying ? '■ stop' : (isDead ? '✕ stream not found' : '▶ play');
  const safeName = s.name.replace(/'/g,"\\'");
  // Edit icon shown for all stations (built-ins editable via override, deletable via hide flag)
  const editBtn = `<button class="pop-icon" onclick="openModalEdit('${safeName}')" title="Edit / delete">✎</button>`;
  document.getElementById('popup-inner').innerHTML = `
    <div class="pop-header">
      <div class="pop-name">${s.name}</div>
    </div>
    <div class="pop-row">
      <div class="pop-loc">${s.city}, ${s.country}</div>
      ${editBtn}
      <button class="pop-icon heart ${isFav?'on':''}" onclick="toggleFav('${safeName}')" title="${isFav?'Remove from favourites':'Add to favourites'}">${isFav?'♥':'♡'}</button>
    </div>
    <div class="pop-desc">${s.desc}</div>
    ${webStr}
    <button class="pop-play ${btnClass}" id="pop-playbtn" onclick="playStation(${idx})">${btnLabel}</button>
  `;
  const isMobile = window.innerWidth < 600;
  if (isMobile) {
    const sb = document.getElementById('sidebar');
    const btn = document.getElementById('toggle-sidebar');
    if (!sb.classList.contains('hidden')) {
      sb.classList.add('hidden'); btn.textContent = '▶';
      setTimeout(()=>{ resize(); drawGlobe(); positionPopup(); }, 260);
      return;
    }
  }
  positionPopup();
  drawGlobe();
}
function positionPopup() {
  if (openIdx === null) return;
  const s = stations[openIdx];
  const pt = proj([s.lng, s.lat]); if (!pt) return;
  const [x, y] = pt;
  const popup = document.getElementById('popup');
  popup.style.display = 'block';
  const pw = 230, ph = 240, margin = 10;
  let left = x + 16;
  if (left + pw > width - margin) left = x - pw - 16;
  left = Math.max(margin, Math.min(width - pw - margin, left));
  let top = y - ph / 2;
  top = Math.max(margin, Math.min(height - ph - margin, top));
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
}
function closePopup() {
  document.getElementById('popup').style.display = 'none';
  openStation = null; openIdx = null; drawGlobe();
}

// ── Globe interaction ──────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  isDragging = false; dragStart = [e.clientX, e.clientY]; rotStart = [...rotation];
});
canvas.addEventListener('mousemove', e => {
  if (!dragStart) return;
  const dx = e.clientX - dragStart[0], dy = e.clientY - dragStart[1];
  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
  if (!isDragging) return;
  const sens = 0.3;
  rotation = [rotStart[0] + dx * sens, Math.max(-85, Math.min(85, rotStart[1] - dy * sens))];
  drawGlobe();
});
canvas.addEventListener('mouseup', e => {
  if (!isDragging) handleClick(e);
  dragStart = null;
});
canvas.addEventListener('mouseleave', ()=>{ dragStart = null; });

let pinchStartDist = null, pinchStartScale = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const t = e.touches[0];
    dragStart = [t.clientX, t.clientY]; rotStart = [...rotation]; isDragging = false;
    pinchStartDist = null;
  } else if (e.touches.length === 2) {
    dragStart = null;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchStartDist = Math.hypot(dx, dy);
    pinchStartScale = proj.scale();
  }
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2 && pinchStartDist) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    const scale = pinchStartScale * (dist / pinchStartDist);
    proj.scale(Math.max(80, Math.min(width * 1.5, scale)));
    drawGlobe();
  } else if (e.touches.length === 1 && dragStart) {
    const t = e.touches[0];
    const dx = t.clientX - dragStart[0], dy = t.clientY - dragStart[1];
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
    if (!isDragging) return;
    rotation = [rotStart[0] + dx * .3, Math.max(-85, Math.min(85, rotStart[1] - dy * .3))];
    drawGlobe();
  }
}, {passive:false});
canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) {
    if (!isDragging && pinchStartDist === null) handleClick(e.changedTouches[0]);
    dragStart = null; pinchStartDist = null;
  }
}, {passive:false});
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  const r = proj.scale() * (e.deltaY>0 ? 0.9 : 1.1);
  proj.scale(Math.max(80, Math.min(width, r)));
  drawGlobe();
},{passive:false});

function handleClick(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  let closest = null, minD = 16;
  stations.forEach((s, i) => {
    const dist = d3.geoDistance([s.lng, s.lat], [-rotation[0], -rotation[1]]);
    if (dist > Math.PI / 2) return;
    const pt = proj([s.lng, s.lat]); if (!pt) return;
    const d = Math.hypot(pt[0]-mx, pt[1]-my);
    if (d < minD) { minD=d; closest=i; }
  });
  if (closest !== null) openPopup(closest);
  else closePopup();
}

function rotateTo(lng, lat, cb) {
  const target = [-lng, -lat];
  const start = [...rotation];
  const t0 = performance.now();
  const dur = 900;
  function step(t) {
    const p = Math.min(1, (t-t0)/dur);
    const ease = p<.5 ? 2*p*p : -1+(4-2*p)*p;
    rotation = [start[0]+(target[0]-start[0])*ease, start[1]+(target[1]-start[1])*ease];
    drawGlobe();
    if(p<1) requestAnimationFrame(step); else { rotation=target; if(cb) cb(); }
  }
  requestAnimationFrame(step);
}

// ── Modal: add / edit / delete ────────────────────────────────────────────
let _modalGeo = null;     // last successful geocode in the modal
let _geoTimer = null;
let _geoSeq = 0;          // serial number to ignore stale geocode responses

function openModal() {
  editingName = null; editingType = null; editingBuiltinKey = null;
  _modalGeo = null;
  document.getElementById('mtitle').textContent = '+ add your radio';
  document.getElementById('msave').textContent = 'Add station';
  document.getElementById('mdelete').style.display = 'none';
  ['mname','mcity','mcountry','mstream','mweb','mdesc'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('rblist').innerHTML = '';
  setGeoStatus('', '📍 location auto-detected from city + country');
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('mname').focus(), 50);
}

function openModalEdit(stationName) {
  const s = stations.find(x => x.name === stationName);
  if (!s) return;
  editingName = stationName;
  if (isCustom(s)) {
    editingType = 'custom';
    editingBuiltinKey = null;
  } else {
    editingType = 'builtin';
    editingBuiltinKey = builtinKeyFor(stationName);
  }
  _modalGeo = (s.lat || s.lng) ? {lat:s.lat, lng:s.lng} : null;
  document.getElementById('mtitle').textContent = editingType === 'builtin' ? '✎ edit radio (built-in)' : '✎ edit radio';
  document.getElementById('msave').textContent = 'Save changes';
  document.getElementById('mdelete').style.display = 'block';
  document.getElementById('mname').value = s.name || '';
  document.getElementById('mcity').value = s.city || '';
  document.getElementById('mcountry').value = s.country || '';
  document.getElementById('mstream').value = s.stream || '';
  document.getElementById('mweb').value = s.web || '';
  document.getElementById('mdesc').value = s.desc || '';
  document.getElementById('rblist').innerHTML = '';
  setGeoStatus(_modalGeo ? 'ok' : '', _modalGeo ? `📍 saved location (${s.lat.toFixed(2)}, ${s.lng.toFixed(2)})` : '📍 location auto-detected from city + country');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('merr').style.display='none';
  document.getElementById('rblist').innerHTML='';
  editingName = null; editingType = null; editingBuiltinKey = null;
}

function setGeoStatus(cls, text) {
  const el = document.getElementById('mgeo');
  el.className = cls || '';
  el.textContent = text;
}

function scheduleGeocode() {
  // user is typing city/country — debounce 500ms then ask Nominatim
  clearTimeout(_geoTimer);
  const city = document.getElementById('mcity').value.trim();
  const country = document.getElementById('mcountry').value.trim();
  if (!city && !country) { setGeoStatus('', '📍 location auto-detected from city + country'); return; }
  setGeoStatus('', '📍 looking up location…');
  _geoTimer = setTimeout(() => geocodeNow(city, country), 500);
}

async function geocodeNow(city, country) {
  const seq = ++_geoSeq;
  const q = [city, country].filter(Boolean).join(', ');
  try {
    const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q), {
      headers: { 'Accept-Language': 'en' }
    });
    const d = await r.json();
    if (seq !== _geoSeq) return; // a newer request superseded this one
    if (d && d[0]) {
      _modalGeo = { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
      setGeoStatus('ok', `📍 located: ${_modalGeo.lat.toFixed(2)}, ${_modalGeo.lng.toFixed(2)}`);
    } else {
      _modalGeo = null;
      setGeoStatus('fail', '📍 not found — will save without coordinates');
    }
  } catch(e) {
    if (seq !== _geoSeq) return;
    _modalGeo = null;
    setGeoStatus('fail', '📍 lookup failed (offline?)');
  }
}

function saveStation() {
  const name = document.getElementById('mname').value.trim();
  const stream = document.getElementById('mstream').value.trim();
  if (!name||!stream) { document.getElementById('merr').style.display='block'; return; }
  const lat = _modalGeo?.lat || 0;
  const lng = _modalGeo?.lng || 0;
  const ns = {
    name,
    city: document.getElementById('mcity').value.trim() || 'Unknown',
    country: document.getElementById('mcountry').value.trim() || 'Unknown',
    lat, lng,
    stream,
    web: document.getElementById('mweb').value.trim(),
    desc: document.getElementById('mdesc').value.trim() || 'User-added station.',
  };
  if (editingName && editingType === 'custom') {
    const i = custom.findIndex(c => c.name === editingName);
    if (i >= 0) custom[i] = ns;
    if (editingName !== name) deadStations.delete(editingName);
    localStorage.setItem('rw_custom', JSON.stringify(custom));
  } else if (editingName && editingType === 'builtin') {
    // Save as override on the original BUILT_IN entry
    if (editingBuiltinKey) {
      builtinOverrides[editingBuiltinKey] = ns;
      localStorage.setItem('rw_overrides', JSON.stringify(builtinOverrides));
    }
    if (editingName !== name) deadStations.delete(editingName);
  } else {
    if (stations.some(s => s.name === name)) {
      document.getElementById('merr').textContent = 'A station with that name already exists.';
      document.getElementById('merr').style.display = 'block';
      return;
    }
    custom.push(ns);
    localStorage.setItem('rw_custom', JSON.stringify(custom));
  }
  rebuildStations();
  closeModal(); renderList(); drawGlobe();
}

function deleteCurrentEdit() {
  if (!editingName) return;
  if (!confirm(`Delete "${editingName}"?`)) return;
  if (editingType === 'custom') {
    custom = custom.filter(c => c.name !== editingName);
    localStorage.setItem('rw_custom', JSON.stringify(custom));
  } else if (editingType === 'builtin' && editingBuiltinKey) {
    hiddenBuiltIns.add(editingBuiltinKey);
    delete builtinOverrides[editingBuiltinKey];
    localStorage.setItem('rw_hidden_builtin', JSON.stringify([...hiddenBuiltIns]));
    localStorage.setItem('rw_overrides', JSON.stringify(builtinOverrides));
  }
  favs.delete(editingName);
  deadStations.delete(editingName);
  localStorage.setItem('rw_favs', JSON.stringify([...favs]));
  if (current?.name === editingName) { audio.pause(); current = null; }
  rebuildStations();
  closePopup();
  closeModal();
  renderList(); drawGlobe();
}

// User overrides on top of PEN_CODE_MAP (manual assignments)
let userPenMap = {};
try { userPenMap = JSON.parse(localStorage.getItem('rw_user_pen_map')||'{}'); } catch(e) {}

// Comprehensive country list (deduplicated by ISO) — built once from PEN_CODE_MAP.
// Used by the assign popup datalist.
const ALL_COUNTRIES = (() => {
  const seen = new Map();
  for (const candList of Object.values(PEN_CODE_MAP)) {
    for (const c of candList) {
      const [name, iso] = c;
      if (!seen.has(iso)) seen.set(iso, name);
    }
  }
  return [...seen.entries()]
    .map(([iso, name]) => ({ iso, name }))
    .sort((a, b) => a.name.localeCompare(b.name));
})();

// Round-robin counter for the few codes that map to two countries
const _penRR = {};
function resolvePenCode(code) {
  // User override takes priority
  if (userPenMap[code]) return userPenMap[code];
  const cands = PEN_CODE_MAP[code];
  if (!cands || !cands.length) return null;
  if (cands.length === 1) return cands[0];
  const i = (_penRR[code] || 0);
  _penRR[code] = i + 1;
  return cands[i % cands.length];
}

// ── Audio dimming during TTS ──────────────────────────────────────────────
// Drop the playing radio's volume by ~20 dB (factor of 0.1) for the duration
// of the country announcement so the spoken name is clearly hearable.
let _dimRAF = null;
function rampAudioVolume(target, durationMs) {
  if (audio.paused) return;
  if (_dimRAF) cancelAnimationFrame(_dimRAF);
  const start = audio.volume;
  const startT = performance.now();
  function step(t) {
    const p = Math.min(1, (t - startT) / durationMs);
    audio.volume = Math.max(0, Math.min(1, start + (target - start) * p));
    if (p < 1) _dimRAF = requestAnimationFrame(step);
    else _dimRAF = null;
  }
  _dimRAF = requestAnimationFrame(step);
}
function dimForAnnouncement() {
  const sliderVol = parseFloat(document.getElementById('vol').value);
  const target = sliderVol * 0.1;  // ≈ -20 dB
  rampAudioVolume(target, 180);
}
function restoreAudioVolume() {
  const sliderVol = parseFloat(document.getElementById('vol').value);
  rampAudioVolume(sliderVol, 200);
}

};

function isoOfStation(s) {
  return STATION_COUNTRY_TO_ISO[(s.country || "").toLowerCase()] || null;
}

// Distance in km between two lat/lng points (Haversine)
function distKm(lat1, lng1, lat2, lng2) {
  const toRad = d => d * Math.PI / 180;
  const R = 6371;
  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(a));
}

// Build the ranked list of curated stations for a tap.
// Priority:
//   1. Favourites in country (closest to region first if region given), then by distance.
//   2. Non-favourites in country (closest to region first if region given), then by distance.
function rankCuratedStations(iso, regionLat, regionLng) {
  const inCountry = stations
    .map((s, i) => ({s, i}))
    .filter(({s}) => isoOfStation(s) === iso);
  if (!inCountry.length) return [];
  // Annotate distance
  for (const item of inCountry) {
    if (regionLat != null) {
      item.dist = distKm(regionLat, regionLng, item.s.lat, item.s.lng);
    } else {
      item.dist = 0; // no region — distance is irrelevant
    }
    item.fav = favs.has(item.s.name);
  }
  // Sort: fav first, then by distance, then by name (stable-ish)
  inCountry.sort((a, b) => {
    if (a.fav !== b.fav) return a.fav ? -1 : 1;
    if (a.dist !== b.dist) return a.dist - b.dist;
    return a.s.name.localeCompare(b.s.name);
  });
  return inCountry;
}

// Per-country (or per-region) tap counter so consecutive taps cycle through.
let _lastTapKey = null;
let _tapCounter = 0;
function pickStationForTap(iso, regionLabel, regionLat, regionLng) {
  const ranked = rankCuratedStations(iso, regionLat, regionLng);
  if (!ranked.length) return null;
  const key = iso + '|' + (regionLabel || '');
  if (_lastTapKey !== key) {
    _lastTapKey = key;
    _tapCounter = 0;
  } else {
    _tapCounter += 1;
  }
  return ranked[_tapCounter % ranked.length];
}

// ── TTS: announce country name on tap ─────────────────────────────────────
function cleanCountryForTTS(name) {
  if (!name) return '';
  return name
    .replace(/, (Islamic |Bolivarian |Plurinational |Federated |United |Democratic People's )?Republic( of)?$/i, '')
    .replace(/, Province of China$/i, '')
    .replace(/Holy See \(Vatican City State\)/i, 'Vatican')
    .replace(/, State of$/i, '')
    .replace(/Lao People's Democratic Republic/i, 'Laos')
    .replace(/Côte d'Ivoire/i, "Ivory Coast")
    .replace(/, Federated States of$/i, '')
    .trim();
}

let _lastAnnouncedKey = null;
async function announceCountry(country, region) {
  const text = region ? `${country}. ${region}` : country;
  const key = country + '|' + (region || '');
  // Skip re-announcing the same country on consecutive taps (cycling stations)
  if (key === _lastAnnouncedKey) return;
  _lastAnnouncedKey = key;
  if (!('speechSynthesis' in window)) return;
  return new Promise((resolve) => {
    try {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'en-US';
      u.rate = 1.0;
      u.pitch = 1.0;
      u.volume = parseFloat(document.getElementById('vol').value);
      let done = false;
      const finish = () => { if (!done) { done = true; resolve(); } };
      u.onend = finish;
      u.onerror = finish;
      window.speechSynthesis.speak(u);
      // Safety: never block longer than 3.5s
      setTimeout(finish, 3500);
    } catch (e) { resolve(); }
  });
}

// ── UI: pen-pill flash ────────────────────────────────────────────────────
function flashPenPill() {
  const pill = document.getElementById('pen-pill');
  if (!pill) return;
  pill.classList.add('active');
  clearTimeout(pill._fadeT);
  pill._fadeT = setTimeout(() => pill.classList.remove('active'), 1200);
}

// Track the last pen tap so we can re-open the assign popup on demand
let _lastPenCode = null;

// ── Pen-code → country assignment popup ──────────────────────────────────
function populateCountryDatalist() {
  const dl = document.getElementById('country-list');
  if (!dl || dl._populated) return;
  dl.innerHTML = ALL_COUNTRIES.map(c => `<option value="${c.name}">${c.iso}</option>`).join('');
  dl._populated = true;
}

function openAssignPopup(code) {
  if (!code) return;
  populateCountryDatalist();
  const pop = document.getElementById('assign-popup');
  document.getElementById('assign-code-display').textContent = code;
  const override = userPenMap[code];
  const builtin  = PEN_CODE_MAP[code];
  const cur = document.getElementById('assign-current');
  if (override) {
    cur.className = 'assign-current overridden';
    cur.textContent = `your override → ${override[0]} (${override[1]})`;
    document.getElementById('assign-clear').style.display = 'block';
  } else if (builtin && builtin.length) {
    cur.className = 'assign-current';
    cur.textContent = `built-in → ${builtin.map(c => c[0]).join(' / ')}`;
    document.getElementById('assign-clear').style.display = 'none';
  } else {
    cur.className = 'assign-current';
    cur.textContent = 'unmapped — pick a country';
    document.getElementById('assign-clear').style.display = 'none';
  }
  const inp = document.getElementById('assign-input');
  inp.value = override ? override[0] : '';
  pop.classList.add('open');
  setTimeout(() => inp.focus(), 50);
}

function closeAssign() {
  document.getElementById('assign-popup').classList.remove('open');
}

function clearAssign() {
  const code = document.getElementById('assign-code-display').textContent;
  if (!code || code === '—') return;
  delete userPenMap[code];
  localStorage.setItem('rw_user_pen_map', JSON.stringify(userPenMap));
  closeAssign();
}

function saveAssign() {
  const code = document.getElementById('assign-code-display').textContent;
  const name = document.getElementById('assign-input').value.trim();
  if (!code || code === '—') return;
  if (!name) return;
  // Exact match first; if not, case-insensitive lookup
  let match = ALL_COUNTRIES.find(c => c.name === name);
  if (!match) match = ALL_COUNTRIES.find(c => c.name.toLowerCase() === name.toLowerCase());
  if (!match) {
    alert(`Country "${name}" not recognised.\nPick one from the suggestions, or type the exact name.`);
    return;
  }
  userPenMap[code] = [match.name, match.iso, null, null, null];
  localStorage.setItem('rw_user_pen_map', JSON.stringify(userPenMap));
  // Reset announcement key so the new country is spoken even if same as last
  _lastAnnouncedKey = null;
  closeAssign();
  // Replay this code so the user gets immediate playback of the right country
  handlePenCode(code);
}

// ── Fallback: fetch top station for ISO from radio-browser and play it ────
async function playRBForCountry(iso, countryName, regionLat, regionLng) {
  document.getElementById('pname').textContent = countryName;
  document.getElementById('pmeta').textContent = `📡 ${iso} — searching radio-browser…`;
  startStatic();
  for (const srv of RB) {
    try {
      const r = await fetch(`${srv}/json/stations/bycountrycodeexact/${iso}?limit=30&hidebroken=true&order=votes&reverse=true`);
      const d = await r.json();
      let candidates = (d || []).filter(x => x.url_resolved || x.url);
      if (!candidates.length) continue;
      // If we have region coords, prefer stations close to it
      if (regionLat != null) {
        candidates.sort((a, b) => {
          const da = distKm(regionLat, regionLng, parseFloat(a.geo_lat)||999, parseFloat(a.geo_long)||999);
          const db = distKm(regionLat, regionLng, parseFloat(b.geo_lat)||999, parseFloat(b.geo_long)||999);
          return da - db;
        });
      }
      const station = candidates[0];
      const url = station.url_resolved || station.url;
      const synth = {
        name: (station.name || `${countryName} radio`).trim(),
        city: station.state || countryName,
        country: countryName,
        lat: parseFloat(station.geo_lat) || (regionLat || 0),
        lng: parseFloat(station.geo_long) || (regionLng || 0),
        stream: url,
        web: station.homepage || "",
        desc: `${(station.tags || "").split(",").slice(0,3).join(", ") || "Live"} · ${countryName}`,
      };
      current = synth;
      audio.src = url; audio.volume = parseFloat(document.getElementById('vol').value);
      try { await audio.play(); playing = true; }
      catch (e) {
        stopStatic(150);
        document.getElementById('pmeta').textContent = '⚠ playback blocked — click ▶';
        return;
      }
      setTimeout(() => stopStatic(450), 100);
      document.getElementById('pname').textContent = synth.name;
      document.getElementById('pmeta').textContent = `${synth.city}, ${synth.country}`;
      updatePlayerUI(); renderList(); drawGlobe();
      if (synth.lat || synth.lng) rotateTo(synth.lng, synth.lat);
      return;
    } catch (e) { /* try next mirror */ }
  }
  stopStatic(150);
  restoreAudioVolume();   // nothing replaced the playing audio — un-dim it
  document.getElementById('pmeta').textContent = `⚠ no station found for ${countryName}`;
}

async function handlePenCode(code) {
  flashPenPill();
  _lastPenCode = code;
  const resolved = resolvePenCode(code);
  if (!resolved) {
    console.log('[pen] unknown code:', code);
    document.getElementById('pmeta').textContent = `🤷 unknown pen code: ${code} — pick a country`;
    openAssignPopup(code);
    return;
  }
  const [country, iso, region, regionLat, regionLng] = resolved;
  console.log('[pen]', code, '→', country, `(${iso})${region ? ' · '+region : ''}`);

  // 1. Dim previous radio (~-20 dB) so the country announcement is hearable.
  dimForAnnouncement();

  // 2. Announce country (first tap only — repeated taps cycle silently).
  await announceCountry(cleanCountryForTTS(country), region);

  // 3. Pick the curated station and play. playStation/playRBForCountry both
  //    set audio.volume back to the slider value, so the dim auto-restores.
  const pick = pickStationForTap(iso, region, regionLat, regionLng);
  if (pick) {
    rotateTo(pick.s.lng, pick.s.lat, () => {
      openPopup(pick.i);
      playStation(pick.i);
    });
  } else {
    await playRBForCountry(iso, country, regionLat, regionLng);
  }
}

// Pen pill click → re-open assign popup with the last tap's code
document.addEventListener('DOMContentLoaded', () => {
  const pill = document.getElementById('pen-pill');
  if (pill) pill.addEventListener('click', () => {
    if (_lastPenCode) openAssignPopup(_lastPenCode);
    else {
      // No tap yet — open with empty placeholder
      populateCountryDatalist();
      document.getElementById('assign-code-display').textContent = '—';
      document.getElementById('assign-current').textContent = 'tap a country with the pen first';
      document.getElementById('assign-input').value = '';
      document.getElementById('assign-clear').style.display = 'none';
      document.getElementById('assign-popup').classList.add('open');
    }
  });
});

// ── Keystroke listener — pen taps come in as a sequence of chars ──────────
// Supports both QWERTY (US/UK) and AZERTY (French) keyboard layouts.
// On AZERTY, the digit keys without shift produce: & é " ' ( § è ! ç à
// and the QWERTY-A position produces 'q'. We normalise these back to digits/'a'.
const PEN_KEY_NORMALIZE = {
  '&':'1','é':'2','"':'3',"'":'4','(':'5','§':'6','è':'7','!':'8','ç':'9','à':'0',
  'q':'a',  // AZERTY "a" key sends QWERTY scancode for q; on French keyboards we get 'q'
};

const PEN_PATTERN = /a\d{4,5}f/;
const PEN_BUFFER_TIMEOUT_MS = 1500;
let _penBuf = "";
let _penLastT = 0;

document.addEventListener('keydown', (e) => {
  const tag = (e.target && e.target.tagName || "").toUpperCase();
  if (tag === "INPUT" || tag === "TEXTAREA" || (e.target && e.target.isContentEditable)) return;
  if (!e.key || e.key.length !== 1) return;
  const ch = (PEN_KEY_NORMALIZE[e.key] !== undefined) ? PEN_KEY_NORMALIZE[e.key] : e.key.toLowerCase();
  const now = Date.now();
  if (now - _penLastT > PEN_BUFFER_TIMEOUT_MS) _penBuf = "";
  _penLastT = now;
  _penBuf += ch;
  if (_penBuf.length > 32) _penBuf = _penBuf.slice(-32);
  const m = _penBuf.match(PEN_PATTERN);
  if (m) {
    const code = m[0];
    _penBuf = _penBuf.slice(_penBuf.indexOf(code) + code.length);
    handlePenCode(code);
  }
});
</script>
