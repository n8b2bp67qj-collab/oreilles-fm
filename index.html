<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oreilles FM</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root { --bg:#0a0a0a; --surface:#141414; --surface2:#1e1e1e; --border:#2a2a2a; --accent:#e8ff47; --text:#f0f0f0; --muted:#555; --dot:#e8ff47; }
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:'Space Mono',monospace; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

#header { display:flex; align-items:center; gap:12px; padding:10px 20px; border-bottom:1px solid var(--border); flex-shrink:0; }
#logo { font-family:'Syne',sans-serif; font-weight:800; font-size:17px; color:var(--accent); white-space:nowrap; letter-spacing:-0.5px; }
#logo span { color:var(--text); }

#player { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:7px 12px; flex:1; max-width:480px; min-width:0; }
#pbtn { width:30px; height:30px; border-radius:50%; background:var(--accent); border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform .1s; }
#pbtn:hover { transform:scale(1.08); }
#pbtn svg { width:11px; height:11px; fill:#000; }
.pi { flex:1; min-width:0; }
.pn { font-family:'Syne',sans-serif; font-weight:700; font-size:12px; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pm { font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
.eq { display:flex; align-items:flex-end; gap:2px; height:14px; flex-shrink:0; }
.eb { width:3px; background:var(--accent); border-radius:1px; height:4px; }
.eq.on .eb { animation:eq .7s ease-in-out infinite alternate; }
.eq.on .eb:nth-child(2) { animation-delay:.2s; }
.eq.on .eb:nth-child(3) { animation-delay:.4s; }
@keyframes eq { to { height:13px; } }
.vw { display:flex; align-items:center; gap:5px; flex-shrink:0; }
.vw svg { width:12px; height:12px; fill:var(--muted); }
#vol { width:52px; accent-color:var(--accent); }
#addbtn { background:transparent; border:1px solid var(--border); color:var(--text); padding:7px 13px; border-radius:5px; font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:all .15s; }
#addbtn:hover { border-color:var(--accent); color:var(--accent); }

#main { display:flex; flex:1; overflow:hidden; }

#sidebar { width:270px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
#sw { padding:10px; border-bottom:1px solid var(--border); }
#search { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:5px; font-family:'Space Mono',monospace; font-size:11px; outline:none; }
#search:focus { border-color:var(--accent); }
#search::placeholder { color:var(--muted); }
#list { flex:1; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.sc { font-size:9px; color:var(--muted); padding:8px 12px; letter-spacing:.5px; }
.si { padding:9px 12px; cursor:pointer; border-bottom:1px solid #181818; display:flex; align-items:center; gap:9px; transition:background .1s; }
.si:hover { background:var(--surface2); }
.si.active { background:#191900; border-left:2px solid var(--accent); }
.sd { width:7px; height:7px; border-radius:50%; background:var(--dot); flex-shrink:0; opacity:.7; }
.si.active .sd { opacity:1; }
.sinfo { flex:1; min-width:0; }
.sn { font-size:11px; font-weight:700; font-family:'Syne',sans-serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sl { font-size:10px; color:var(--muted); margin-top:1px; }

#mapwrap { flex:1; position:relative; }
#map { width:100%; height:100%; }
.leaflet-container { background:#0d1117 !important; }
.leaflet-tile { filter:invert(1) hue-rotate(180deg) brightness(.85) contrast(1.1) saturate(.5); }
.leaflet-control-zoom a { background:var(--surface) !important; color:var(--text) !important; border-color:var(--border) !important; }
.leaflet-control-attribution { background:rgba(0,0,0,.5) !important; color:var(--muted) !important; font-size:9px !important; }
.leaflet-popup-content-wrapper { background:var(--surface) !important; border:1px solid var(--border) !important; border-radius:8px !important; box-shadow:0 8px 32px rgba(0,0,0,.7) !important; padding:0 !important; }
.leaflet-popup-content { margin:0 !important; width:220px !important; }
.leaflet-popup-tip { background:var(--surface) !important; }
.leaflet-popup-close-button { color:var(--muted) !important; top:8px !important; right:8px !important; }

.rm { width:12px; height:12px; border-radius:50%; background:var(--dot); border:1.5px solid rgba(0,0,0,.4); cursor:pointer; transition:transform .15s; opacity:.85; }
.rm:hover { transform:scale(1.7); opacity:1; }
.rm.playing { opacity:1; border-color:rgba(0,0,0,.2); box-shadow:0 0 0 3px rgba(232,255,71,.25),0 0 10px rgba(232,255,71,.4); animation:pm 1.5s ease-in-out infinite; }
@keyframes pm { 50% { box-shadow:0 0 0 6px rgba(232,255,71,.1),0 0 18px rgba(232,255,71,.5); } }

.pp { padding:13px; }
.pname { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:#f0f0f0; margin-bottom:2px; }
.ploc { font-size:10px; color:var(--muted); margin-bottom:8px; }
.pdesc { font-size:11px; color:#aaa; line-height:1.55; margin-bottom:10px; font-style:italic; }
.pplay { width:100%; padding:8px; background:var(--accent); color:#000; border:none; border-radius:5px; font-family:'Syne',sans-serif; font-weight:700; font-size:12px; cursor:pointer; transition:opacity .15s; }
.pplay:hover { opacity:.85; }
.pplay.loading { background:var(--surface2); color:var(--muted); cursor:default; }
.pplay.stop { background:#ff6b35; color:#fff; }

#modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:9999; display:none; align-items:center; justify-content:center; }
#modal-overlay.open { display:flex; }
#modal { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:22px; width:380px; max-width:95vw; max-height:90vh; overflow-y:auto; }
#modal h2 { font-family:'Syne',sans-serif; font-size:15px; font-weight:800; margin-bottom:14px; color:var(--accent); }
.mf { margin-bottom:10px; }
.mf label { display:block; font-size:9px; color:var(--muted); margin-bottom:3px; text-transform:uppercase; letter-spacing:.5px; }
.mf input,.mf select,.mf textarea { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:7px 9px; border-radius:5px; font-family:'Space Mono',monospace; font-size:11px; outline:none; }
.mf input:focus,.mf select:focus,.mf textarea:focus { border-color:var(--accent); }
.mf textarea { resize:vertical; min-height:50px; }
.mf select option { background:var(--surface2); }
.hint { font-size:9px; color:var(--muted); margin-top:3px; font-style:italic; }
.mrow { display:flex; gap:8px; }
.mrow .mf { flex:1; }
.mbtns { display:flex; gap:8px; margin-top:14px; }
.mbtns button { flex:1; padding:9px; border-radius:5px; font-family:'Syne',sans-serif; font-weight:700; font-size:12px; cursor:pointer; border:none; }
#mcancel { background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
#msave { background:var(--accent); color:#000; }
#merr { font-size:10px; color:#ff6b6b; margin-top:6px; display:none; }
.rbs { padding:7px 0; border-bottom:1px solid var(--border); cursor:pointer; transition:padding .1s; }
.rbs:hover { padding-left:4px; }
.rbn { font-size:11px; font-weight:700; font-family:'Syne',sans-serif; color:var(--text); }
.rbm { font-size:10px; color:var(--muted); }
#rblist { margin-top:8px; max-height:150px; overflow-y:auto; }
#rbgo { width:100%; padding:7px; background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:5px; font-family:'Space Mono',monospace; font-size:11px; cursor:pointer; margin-top:5px; }
#rbgo:hover { border-color:var(--accent); color:var(--accent); }
audio { display:none; }
</style>
</head>
<body>
<div id="header">
  <div id="logo">OREILLES<span> FM</span></div>
  <div id="player">
    <button id="pbtn" onclick="togglePlay()"><svg id="picon" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg></button>
    <div class="pi"><div class="pn" id="pname">Select a station</div><div class="pm" id="pmeta">click any dot on the map</div></div>
    <div class="eq" id="eq"><div class="eb"></div><div class="eb"></div><div class="eb"></div></div>
    <div class="vw"><svg viewBox="0 0 14 12"><path d="M0 4h3l4-4v12l-4-4H0zM10 2a6 6 0 010 8M8 3.5a3.5 3.5 0 010 5"/></svg><input type="range" id="vol" min="0" max="1" step=".01" value=".8" oninput="audio.volume=this.value"></div>
  </div>
  <button id="addbtn" onclick="openModal()">+ Add radio</button>
</div>
<div id="main">
  <div id="sidebar">
    <div id="sw"><input type="text" id="search" placeholder="Search…" oninput="renderList()"></div>
    <div id="list"></div>
  </div>
  <div id="mapwrap"><div id="map"></div></div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h2>+ Add radio</h2>
    <div class="mf">
      <label>Search Radio Browser (30 000+ stations)</label>
      <input type="text" id="rbq" placeholder="Station name…" onkeydown="if(event.key==='Enter')searchRB()">
      <button id="rbgo" onclick="searchRB()">Search →</button>
      <div id="rblist"></div>
    </div>
    <div style="border-top:1px solid var(--border);margin:12px 0;font-size:10px;color:var(--muted);text-align:center">— or add manually —</div>
    <div class="mf"><label>Name *</label><input type="text" id="mname" placeholder="Station name"></div>
    <div class="mrow">
      <div class="mf"><label>City</label><input type="text" id="mcity"></div>
      <div class="mf"><label>Country</label><input type="text" id="mcountry"></div>
    </div>
    <div class="mf"><label>Description</label><textarea id="mdesc" placeholder="Short description…"></textarea></div>
    <div class="mf"><label>Stream URL *</label><input type="text" id="mstream" placeholder="https://…stream….mp3"><div class="hint">Direct .mp3 / .aac / .ogg stream link</div></div>
    <div class="mf"><label>Website</label><input type="text" id="mweb" placeholder="https://…"></div>
    <div class="mrow">
      <div class="mf"><label>Latitude</label><input type="number" id="mlat" placeholder="e.g. 43.61" step=".01"></div>
      <div class="mf"><label>Longitude</label><input type="number" id="mlng" placeholder="e.g. 3.87" step=".01"></div>
    </div>
    <div id="merr">Please provide at least a name and a stream URL.</div>
    <div class="mbtns"><button id="mcancel" onclick="closeModal()">Cancel</button><button id="msave" onclick="saveStation()">Add station</button></div>
  </div>
</div>

<audio id="audio-el"></audio>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const RB = ["https://de1.api.radio-browser.info","https://nl1.api.radio-browser.info","https://at1.api.radio-browser.info"];
let rbServer = RB[0];

async function getStream(s) {
  if (s.stream) return s.stream;
  try {
    const r = await fetch(`${rbServer}/json/stations/search?name=${encodeURIComponent(s.name)}&limit=5&hidebroken=true&order=votes&reverse=true`);
    const d = await r.json();
    if (d[0]?.url_resolved) return d[0].url_resolved;
    if (d[0]?.url) return d[0].url;
  } catch(e) {}
  // try next server
  for (const srv of RB) {
    if (srv === rbServer) continue;
    try {
      const r = await fetch(`${srv}/json/stations/search?name=${encodeURIComponent(s.name)}&limit=5&hidebroken=true`);
      const d = await r.json();
      if (d[0]?.url_resolved) return d[0].url_resolved;
    } catch(e) {}
  }
  return null;
}

async function searchRB() {
  const q = document.getElementById('rbq').value.trim();
  if (!q) return;
  const btn = document.getElementById('rbgo');
  btn.textContent = 'Searching…'; btn.disabled = true;
  const el = document.getElementById('rblist');
  try {
    const r = await fetch(`${rbServer}/json/stations/search?name=${encodeURIComponent(q)}&limit=8&hidebroken=true&order=votes&reverse=true`);
    const d = await r.json();
    el.innerHTML = d.length ? d.map(s=>`<div class="rbs" onclick="fillRB('${encodeURIComponent(JSON.stringify({name:s.name,city:s.state||s.country,country:s.country,lat:parseFloat(s.geo_lat)||0,lng:parseFloat(s.geo_long)||0,stream:s.url_resolved||s.url,web:s.homepage}))}')"><div class="rbn">${s.name}</div><div class="rbm">${s.country}</div></div>`).join('')
      : '<div class="rbs"><div class="rbm">No results</div></div>';
  } catch(e) { el.innerHTML = '<div class="rbs"><div class="rbm" style="color:#ff6b6b">Search failed</div></div>'; }
  btn.textContent = 'Search →'; btn.disabled = false;
}

function fillRB(enc) {
  const s = JSON.parse(decodeURIComponent(enc));
  document.getElementById('mname').value = s.name||'';
  document.getElementById('mcity').value = s.city||'';
  document.getElementById('mcountry').value = s.country||'';
  document.getElementById('mstream').value = s.stream||'';
  document.getElementById('mweb').value = s.web||'';
  document.getElementById('mlat').value = s.lat||'';
  document.getElementById('mlng').value = s.lng||'';
  document.getElementById('rblist').innerHTML = '<div style="font-size:10px;color:#1D9E75;padding:6px 0">✓ Filled — review then click Add station</div>';
}

let custom = [];
try { custom = JSON.parse(localStorage.getItem('rw_custom')||'[]'); } catch(e) {}
let stations = [...BUILT_IN, ...custom];

let current = null, playing = false, markers = {}, map;
const audio = document.getElementById('audio-el');

function initMap() {
  map = L.map('map',{center:[25,10],zoom:2,zoomControl:true});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
  renderMarkers();
}

function mkIcon(isPlaying) {
  return L.divIcon({
    className:'',
    html:`<div class="rm${isPlaying?' playing':''}"></div>`,
    iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-10]
  });
}

function buildPopup(s,i) {
  const isP = current?.name===s.name;
  let btnLabel = '▶ Play', btnClass = '';
  if (isP && playing) { btnLabel = '■ Stop'; btnClass = 'stop'; }
  const webLink = s.web ? `<a href="${s.web}" target="_blank" style="font-size:10px;color:var(--accent);text-decoration:none;opacity:.7;display:block;margin-bottom:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.7">${s.web.replace(/^https?:\/\//,'')}</a>` : '';
  return `<div class="pp"><div class="pname">${s.name}</div><div class="ploc">${s.city}, ${s.country}</div><div class="pdesc">${s.desc}</div>${webLink}<button class="pplay ${btnClass}" id="pb${i}" onclick="handlePlay(${i})">${btnLabel}</button></div>`;
}

function renderMarkers() {
  Object.values(markers).forEach(m => { try { map.removeLayer(m); } catch(e){} });
  markers = {};
  stations.forEach((s,i) => {
    const m = L.marker([s.lat,s.lng],{icon:mkIcon(current?.name===s.name&&playing)}).addTo(map);
    m.bindPopup(buildPopup(s,i),{maxWidth:240});
    markers[i] = m;
  });
}

async function handlePlay(idx) {
  const s = stations[idx];
  const btn = document.getElementById(`pb${idx}`);
  if (current?.name===s.name && playing) { audio.pause(); return; }
  if (btn) { btn.className='pplay loading'; btn.textContent='⟳ Loading…'; }
  const url = await getStream(s);
  if (!url) {
    if (btn) { btn.className='pplay'; btn.textContent='✕ Stream not found'; }
    document.getElementById('pmeta').textContent='⚠ Stream not found for '+s.name;
    return;
  }
  current = s;
  audio.src = url;
  audio.volume = parseFloat(document.getElementById('vol').value);
  try { await audio.play(); playing = true; }
  catch(e) { if (btn) { btn.className='pplay'; btn.textContent='✕ Blocked — try another'; } return; }
  document.getElementById('pname').textContent = s.name;
  document.getElementById('pmeta').textContent = s.city+', '+s.country;
  updateUI(); renderMarkers(); renderList();
  setTimeout(()=>{ if(markers[idx]) markers[idx].openPopup(); },80);
}

function togglePlay() {
  if (!current) return;
  if (playing) audio.pause(); else audio.play();
}

audio.addEventListener('play',()=>{ playing=true; updateUI(); renderMarkers(); renderList(); });
audio.addEventListener('pause',()=>{ playing=false; updateUI(); renderMarkers(); renderList(); });
audio.addEventListener('error',()=>{ document.getElementById('pmeta').textContent='⚠ Stream unavailable'; playing=false; updateUI(); });

function updateUI() {
  document.getElementById('picon').innerHTML = playing
    ? '<rect x="1" y="0" width="3" height="12"/><rect x="6" y="0" width="3" height="12"/>'
    : '<polygon points="0,0 10,6 0,12"/>';
  document.getElementById('eq').classList.toggle('on', playing);
}

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  const list = stations.map((s,i)=>({...s,_i:i})).filter(s=>
    !q || s.name.toLowerCase().includes(q) || s.city.toLowerCase().includes(q) || s.country.toLowerCase().includes(q)
  );
  document.getElementById('list').innerHTML =
    `<div class="sc">${list.length} station${list.length!==1?'s':''}</div>` +
    list.map(s=>`<div class="si ${current?.name===s.name?'active':''}" onclick="flyTo(${s._i})">
      <div class="sd"></div>
      <div class="sinfo"><div class="sn">${s.name}</div><div class="sl">${s.city}, ${s.country}</div></div>
    </div>`).join('');
}

function flyTo(idx) {
  map.flyTo([stations[idx].lat,stations[idx].lng],6,{duration:1.2});
  setTimeout(()=>{ if(markers[idx]) markers[idx].openPopup(); },1300);
}

function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); document.getElementById('merr').style.display='none'; document.getElementById('rblist').innerHTML=''; }

function saveStation() {
  const name = document.getElementById('mname').value.trim();
  const stream = document.getElementById('mstream').value.trim();
  if (!name||!stream) { document.getElementById('merr').style.display='block'; return; }
  const ns = {
    name, city:document.getElementById('mcity').value.trim()||'Unknown',
    country:document.getElementById('mcountry').value.trim()||'Unknown',
    lat:parseFloat(document.getElementById('mlat').value)||0,
    lng:parseFloat(document.getElementById('mlng').value)||0,
    stream, web:document.getElementById('mweb').value.trim(),
    desc:document.getElementById('mdesc').value.trim()||'User-added station.',
  };
  custom.push(ns); stations = [...BUILT_IN,...custom];
  localStorage.setItem('rw_custom',JSON.stringify(custom));
  closeModal(); renderMarkers(); renderList();
  ['mname','mcity','mcountry','mstream','mweb','mlat','mlng','mdesc'].forEach(id=>document.getElementById(id).value='');
}

document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });
window.addEventListener('DOMContentLoaded',()=>{ renderList(); initMap(); });
</script>
</body>
